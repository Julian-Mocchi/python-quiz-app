<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>гӮ«гғҶгӮҙгғӘйҒёжҠһ</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h2>гӮ«гғҶгӮҙгғӘгӮ’йҒёжҠһ</h2>

  <button class="btn" onclick="goLevel('PythonеҹәзӨҺ')">PythonеҹәзӨҺ</button>
  <button class="btn" onclick="goLevel('Pythonеҝңз”Ё')">Pythonеҝңз”Ё</button>

  <button class="btn" style="margin-top:20px;background:#aaa;" onclick="goBack()">жҲ»гӮӢ</button>
</div>

<script>
function goLevel(category) {
  const params = new URLSearchParams(window.location.search);
  const username = params.get("username");
  window.location.href = `/level.html?username=${username}&category=${category}`;
}

function goBack() {
  const params = new URLSearchParams(window.location.search);
  const username = params.get("username");
  window.location.href = `/mypage.html?username=${username}`;
}
</script>

</body>
</html>
