<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>гГђгГЩгГЂйБЄжКЮ</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h2>гГђгГЩгГЂгВТйБЄжКЮ</h2>

  <button class="btn" onclick="goQuiz('еИЭзіЪ')">еИЭзіЪ</button>
  <button class="btn" onclick="goQuiz('дЄ≠зіЪ')">дЄ≠зіЪ</button>

  <button class="btn" style="margin-top:20px;background:#aaa;" onclick="goBack()">жИїгВЛ</button>
</div>

<script>
function goQuiz(level) {
  const params = new URLSearchParams(window.location.search);
  const username = params.get("username");
  const category = params.get("category");

  window.location.href =
    `/quiz.html?username=${username}&category=${category}&level=${level}`;
}

function goBack() {
  const params = new URLSearchParams(window.location.search);
  const username = params.get("username");
  const category = params.get("category");

  window.location.href =
    `/category.html?username=${username}`;
}
</script>

</body>
</html>
