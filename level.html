<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>レベル選択</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2 id="category-title"></h2>

  <div class="grid">
    <div class="card" onclick="selectLevel('初級')">
      <h3>初級</h3>
    </div>

    <div class="card" onclick="selectLevel('中級')">
      <h3>中級</h3>
    </div>

    <div class="card" onclick="selectLevel('上級')">
      <h3>上級</h3>
    </div>
  </div>

  <button class="btn" style="background:#aaa;margin-top:20px;" onclick="back()">戻る</button>
</div>

<script>
document.getElementById("category-title").innerText =
  "カテゴリ: " + localStorage.getItem("category");

function selectLevel(level) {
  localStorage.setItem("level", level);
  window.location.href = "quiz.html";
}

function back() {
  window.location.href = "category.html";
}
</script>

</body>
</html>
