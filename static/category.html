<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カテゴリ選択</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>カテゴリを選択</h2>

  <div class="grid">
    <div class="card" onclick="selectCategory('Python基礎')">
      <h3>Python基礎</h3>
    </div>

    <div class="card" onclick="selectCategory('データ型')">
      <h3>データ型</h3>
    </div>

    <div class="card" onclick="selectCategory('制御構文')">
      <h3>制御構文</h3>
    </div>

    <div class="card" onclick="selectCategory('関数')">
      <h3>関数</h3>
    </div>

    <div class="card" onclick="selectCategory('クラス')">
      <h3>クラス</h3>
    </div>

    <div class="card" onclick="selectCategory('応用問題')">
      <h3>応用問題</h3>
    </div>
  </div>

  <button class="btn" style="background:#aaa;margin-top:20px;" onclick="back()">戻る</button>
</div>

<script>
function selectCategory(cat) {
  localStorage.setItem("category", cat);
  window.location.href = "level.html";
}

function back() {
  window.location.href = "mypage.html";
}
</script>

</body>
</html>
