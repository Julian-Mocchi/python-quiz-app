<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>新規登録</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>新規登録</h2>

  <div class="card">
    <input id="username" placeholder="ユーザー名">
    <input id="password" type="password" placeholder="パスワード">
    <input id="password2" type="password" placeholder="パスワード（確認）">

    <button class="btn" onclick="register()">登録する</button>

    <p class="message" id="msg"></p>

    <p style="margin-top:15px;">
      すでにアカウントがある？ <a href="login.html">ログイン</a>
    </p>
  </div>
</div>

<script>
async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;

  if (password !== password2) {
    document.getElementById("msg").innerText = "パスワードが一致しません";
    return;
  }

  const res = await fetch("/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  const data = await res.json();

  if (data.status === "registered") {
    alert("登録が完了しました。ログインしてください。");
    window.location.href = "login.html";
  } else if (data.status === "exists") {
    document.getElementById("msg").innerText = "そのユーザー名は既に使われています";
  } else {
    document.getElementById("msg").innerText = "登録に失敗しました";
  }
}
</script>

</body>
</html>
